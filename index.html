<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Revert.io (Мобильная версия)</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-user-select: none; touch-action: none; }
        body, html { width: 100%; height: 100%; overflow: hidden; background-color: #0b0c10; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        #main-menu {
            position: absolute; width: 100%; height: 100%; z-index: 10;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: radial-gradient(circle, #1f2833 0%, #0b0c10 100%);
            transition: opacity 0.5s ease;
        }
        .title {
            font-size: 72px; font-weight: 900; color: #66fcf1;
            text-shadow: 0 0 10px #66fcf1, 0 0 30px #45a29e;
            letter-spacing: 5px; margin-bottom: 10px;
        }
        @media (max-width: 768px) { .title { font-size: 48px; } }
        
        #tips {
            font-size: 18px; color: #c5a059; height: 30px; margin-bottom: 40px; text-align: center; padding: 0 10px;
            text-shadow: 0 0 5px rgba(197, 160, 89, 0.5); transition: opacity 0.5s ease; opacity: 0;
        }
        #nickname {
            width: 280px; padding: 15px; font-size: 18px; border: 2px solid #45a29e;
            background: rgba(31, 40, 51, 0.8); color: #fff; border-radius: 8px;
            text-align: center; outline: none; margin-bottom: 25px; transition: 0.3s;
        }
        #nickname:focus { border-color: #66fcf1; box-shadow: 0 0 15px rgba(102, 252, 241, 0.4); }
        #play-btn {
            width: 280px; padding: 15px; font-size: 22px; font-weight: bold;
            background: #66fcf1; color: #0b0c10; border: none; border-radius: 8px;
            cursor: pointer; transition: 0.2s ease-in-out; box-shadow: 0 0 15px #66fcf1;
        }
        #play-btn:hover:not(:disabled) { transform: scale(1.05); background: #fff; box-shadow: 0 0 25px #fff; }
        #play-btn:disabled { background: #45a29e; color: #1f2833; cursor: not-allowed; box-shadow: none; opacity: 0.6; }
        #game-canvas { display: none; width: 100%; height: 100%; background: #0c0f12; }
        
        /* СЧЕТЧИК МАССЫ (Сдвинут чуть ниже, чтобы на телефонах не пересекаться с радаром) */
        #mass-counter {
            display: none; position: absolute; top: 160px; left: 20px; z-index: 5;
            color: #66fcf1; font-size: 24px; font-weight: bold;
            text-shadow: 0 0 10px rgba(102, 252, 241, 0.6);
        }
        @media (max-width: 768px) { #mass-counter { top: 145px; font-size: 20px; left: 15px; } }

        /* ЭЛЕМЕНТЫ УПРАВЛЕНИЯ ДЛЯ СМАРТФОНОВ */
        #mobile-joystick-zone {
            display: none; position: absolute; bottom: 40px; left: 40px;
            width: 140px; height: 140px; background: rgba(31, 40, 51, 0.3);
            border: 2px solid rgba(102, 252, 241, 0.4); border-radius: 50%; z-index: 6;
            align-items: center; justify-content: center;
        }
        #mobile-joystick-stick {
            width: 50px; height: 50px; background: #66fcf1;
            border-radius: 50%; box-shadow: 0 0 15px #66fcf1;
            position: absolute; pointer-events: none;
        }
        
        #mobile-buttons-zone {
            display: none; position: absolute; bottom: 40px; right: 40px;
            gap: 20px; flex-direction: column; align-items: center; z-index: 6;
        }
        .mobile-btn {
            width: 75px; height: 75px; border-radius: 50%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            font-weight: bold; font-size: 14px; border: 3px solid #66fcf1;
            box-shadow: 0 0 15px rgba(102, 252, 241, 0.4); transition: 0.1s;
        }
        #mobile-boost-btn { background: rgba(102, 252, 241, 0.2); color: #66fcf1; }
        #mobile-boost-btn.active { background: #66fcf1; color: #0b0c10; transform: scale(0.95); box-shadow: 0 0 25px #66fcf1; }
        
        #mobile-shift-btn { background: #1f2833; color: #66fcf1; font-size: 28px; position: relative; }
        #mobile-shift-btn.cooldown { border-color: #ff0055; color: #ff0055; opacity: 0.6; box-shadow: 0 0 15px rgba(255, 0, 85, 0.2); }
        #mobile-cd-timer {
            position: absolute; width: 100%; height: 100%; display: flex;
            align-items: center; justify-content: center; background: rgba(11, 12, 16, 0.85);
            border-radius: 50%; font-size: 20px; font-weight: bold; color: #ff0055; display: none;
        }

        /* ПОДСКАЗКА КЛАВИШИ НА ПК */
        .pc-hint { margin-top: 4px; color: #888; font-size: 11px; font-weight: bold; text-shadow: 0 2px 4px #000; }
        @media (max-width: 768px) { .pc-hint { display: none; } }

        #leaderboard {
            display: none; position: absolute; top: 20px; right: 20px; z-index: 5;
            background: rgba(11, 12, 16, 0.75); border: 1px solid #45a29e;
            border-radius: 8px; width: 220px; padding: 15px; color: #fff;
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
        }
        @media (max-width: 768px) {
            #leaderboard { width: 150px; padding: 8px; top: 15px; right: 15px; }
            #leaderboard h3 { font-size: 13px; margin-bottom: 5px; }
            .leader-item { font-size: 11px; }
        }
        #leaderboard h3 { color: #66fcf1; font-size: 18px; margin-bottom: 10px; text-align: center; text-transform: uppercase; border-bottom: 1px solid #45a29e; padding-bottom: 5px;}
        .leader-item { display: flex; justify-content: space-between; font-size: 14px; margin-bottom: 4px; color: #c5a059; }
        .leader-item.player { color: #66fcf1; font-weight: bold; text-shadow: 0 0 5px #66fcf1; }
    </style>
</head>
<body>

    <div id="main-menu">
        <h1 class="title">Revert.io</h1>
        <div id="tips">Загрузка подсказок...</div>
        <input type="text" id="nickname" placeholder="Nickname..." maxlength="14" value="Player">
        <button id="play-btn">PLAY</button>
    </div>

    <div id="mass-counter">MASS: 35</div>

    <div id="leaderboard">
        <h3>Leaderboard</h3>
        <div id="leader-list"></div>
    </div>

    <div id="mobile-joystick-zone">
        <div id="mobile-joystick-stick"></div>
    </div>

    <div id="mobile-buttons-zone">
        <div id="mobile-shift-btn" class="mobile-btn">
            ⇄
            <div id="mobile-cd-timer">40</div>
            <div class="pc-hint">[ T ]</div>
        </div>
        <div id="mobile-boost-btn" class="mobile-btn">
            <span>BOOST</span>
            <div class="pc-hint">[ SPACE ]</div>
        </div>
    </div>

    <canvas id="game-canvas"></canvas>

    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script>
        (function() {
            // Замени на URL своего сервера
            const socket = io("https://revert-io-server.onrender.com");

            const menu = document.getElementById('main-menu');
            const tipsDiv = document.getElementById('tips');
            const playBtn = document.getElementById('play-btn');
            const canvas = document.getElementById('game-canvas');
            const massCounterUI = document.getElementById('mass-counter');
            const leaderboardUI = document.getElementById('leaderboard');
            const leaderList = document.getElementById('leader-list');
            const nicknameInput = document.getElementById('nickname');
            const ctx = canvas.getContext('2d');

            // Мобильные элементы UI
            const joystickZone = document.getElementById('mobile-joystick-zone');
            const joystickStick = document.getElementById('mobile-joystick-stick');
            const mobileButtonsZone = document.getElementById('mobile-buttons-zone');
            const boostBtn = document.getElementById('mobile-boost-btn');
            const shiftBtn = document.getElementById('mobile-shift-btn');
            const cdTimerText = document.getElementById('mobile-cd-timer');

            const tips = [
                "Используй Квантовый Переворот, чтобы превратить свой хвост в голову!",
                "Зажми кнопку BOOST или Пробел для резкого ускорения.",
                "Осторожно! Красная граница карты смертельно опасна!",
                "Змейка продолжит ползти, даже если свернуть вкладку браузера."
            ];
            let tipIndex = 0;
            setInterval(() => {
                tipsDiv.style.opacity = 0;
                setTimeout(() => {
                    tipsDiv.innerText = tips[tipIndex];
                    tipsDiv.style.opacity = 1;
                    tipIndex = (tipIndex + 1) % tips.length;
                }, 500);
            }, 5000);

            const WORLD_SIZE = 4000;
            const maxSegmentRadius = 14;

            const SKINS = [
                { name: "Кибер-Циан", head: ["#ffffff", "#66fcf1", "#1f9c94"], body: ["#a6fff6", "#45a29e", "#1f2833"], tail: ["#ffffff", "#ff0055", "#990033"] },
                { name: "Вулканическая Лава", head: ["#ffffff", "#ff4500", "#8b0000"], body: ["#ffa07a", "#d2691e", "#3a1200"], tail: ["#ffffff", "#ffcc00", "#8b6508"] },
                { name: "Ядовитый Плющ", head: ["#ffffff", "#00ff00", "#006400"], body: ["#adff2f", "#32cd32", "#0b2000"], tail: ["#ffffff", "#ff00ff", "#8b008b"] }
            ];

            let currentSkin = SKINS[0]; 
            let isPlaying = false;
            let mouse = { x: 0, y: 0 };
            let myId = null;

            let foods = [];
            let otherPlayers = {};
            let particles = [];
            let camera = { x: 0, y: 0 };
            let isBoosting = false;

            // Логика кулдауна
            let isCooldown = false;
            let cdDuration = 40; 
            let cdRemaining = 0;
            let cdInterval;

            // Флаг детекта мобильного устройства
            let isMobile = false;
            function checkDevice() {
                isMobile = ('onTouchStart' in window || navigator.maxTouchPoints > 0 || window.innerWidth <= 768);
            }

            // Переменные для виртуального джойстика
            let joystickActive = false;
            let joystickCenter = { x: 0, y: 0 };
            let joystickAngle = 0;

            // СЕТЕВЫЕ СОБЫТИЯ
            socket.on('connect', () => { myId = socket.id; });
            socket.on('init_data', (data) => { foods = data.foods; otherPlayers = data.players; });
            socket.on('spawned', (pData) => {
                isPlaying = true;
                camera.x = pData.x - canvas.width / 2;
                camera.y = pData.y - canvas.height / 2;
            });
            socket.on('new_player', (p) => { otherPlayers[p.id] = p; });
            socket.on('player_disconnected', (id) => { delete otherPlayers[id]; });
            socket.on('food_update', (data) => {
                const idx = foods.findIndex(f => f.id === data.eatenId);
                if (idx !== -1) foods.splice(idx, 1);
                foods.push(data.newFood);
            });
            socket.on('foods_spawned', (newFoods) => { foods = foods.concat(newFoods); });
            socket.on('player_exploded', (data) => { createExplosion(data.x, data.y, data.color, 40); });
            socket.on('player_died_notification', (id) => { if (id === socket.id) gameOver(); else delete otherPlayers[id]; });
            socket.on('heartbeat', (serverPlayers) => {
                otherPlayers = serverPlayers;
                if (isPlaying && otherPlayers[socket.id]) {
                    massCounterUI.innerText = `MASS: ${otherPlayers[socket.id].score}`;
                }
                updateLeaderboard();
            });

            // ИНПУТЫ ДЛЯ ПК (Мышь и Клавиатура)
            window.addEventListener('mousemove', (e) => { if(!joystickActive) { mouse.x = e.clientX; mouse.y = e.clientY; } });
            window.addEventListener('mousedown', (e) => { if (e.button === 0 && isPlaying && !isMobile) { isBoosting = true; sendInput(); } });
            window.addEventListener('mouseup', (e) => { if (e.button === 0 && !isMobile) { isBoosting = false; sendInput(); } });
            window.addEventListener('keydown', (e) => {
                if (!isPlaying) return;
                if (e.code === 'Space') { e.preventDefault(); isBoosting = true; sendInput(); }
                if (e.key.toLowerCase() === 't' || e.key.toLowerCase() === 'е') activateQuantumShift();
            });
            window.addEventListener('keyup', (e) => { if (e.code === 'Space') { isBoosting = false; sendInput(); } });

            // ОБРАБОТКА СЕНСОРНОГО ДЖОЙСТИКА (TOUCH EVENTS)
            joystickZone.addEventListener('touchstart', (e) => {
                e.preventDefault();
                joystickActive = true;
                const rect = joystickZone.getBoundingClientRect();
                joystickCenter.x = rect.left + rect.width / 2;
                joystickCenter.y = rect.top + rect.height / 2;
                handleJoystickMove(e.targetTouches[0].clientX, e.targetTouches[0].clientY);
            });

            joystickZone.addEventListener('touchmove', (e) => {
                e.preventDefault();
                if (!joystickActive) return;
                handleJoystickMove(e.targetTouches[0].clientX, e.targetTouches[0].clientY);
            });

            joystickZone.addEventListener('touchend', (e) => {
                e.preventDefault();
                joystickActive = false;
                joystickStick.style.transform = `translate(0px, 0px)`;
            });

            function handleJoystickMove(touchX, touchY) {
                let dx = touchX - joystickCenter.x;
                let dy = touchY - joystickCenter.y;
                let dist = Math.sqrt(dx * dx + dy * dy);
                let maxLen = 45; // Ограничение движения стика внутри кольца

                joystickAngle = Math.atan2(dy, dx);

                if (dist > maxLen) {
                    dx = Math.cos(joystickAngle) * maxLen;
                    dy = Math.sin(joystickAngle) * maxLen;
                }

                joystickStick.style.transform = `translate(${dx}px, ${dy}px)`;
                sendInput();
            }

            // МОБИЛЬНЫЕ КНОПКИ (Ускорение и переворот)
            boostBtn.addEventListener('touchstart', (e) => { e.preventDefault(); isBoosting = true; boostBtn.classList.add('active'); sendInput(); });
            boostBtn.addEventListener('touchend', (e) => { e.preventDefault(); isBoosting = false; boostBtn.classList.remove('active'); sendInput(); });
            shiftBtn.addEventListener('touchstart', (e) => { e.preventDefault(); activateQuantumShift(); });

            function sendInput() {
                if (!isPlaying || !otherPlayers[socket.id]) return;
                let targetAngle = 0;

                if (isMobile && joystickActive) {
                    // На мобилках берем угол напрямую с джойстика
                    targetAngle = joystickAngle;
                } else {
                    // На ПК считаем угол относительно центра экрана к курсору мыши
                    let me = otherPlayers[socket.id];
                    let headScreenX = me.x - camera.x;
                    let headScreenY = me.y - camera.y;
                    targetAngle = Math.atan2(mouse.y - headScreenY, mouse.x - headScreenX);
                }
                
                socket.emit('update_input', { targetAngle: targetAngle, isBoosting: isBoosting });
            }

            // Отправляем пакеты ввода на сервер с интервалом в 50мс
            setInterval(sendInput, 50);

            playBtn.addEventListener('click', () => {
                if (playBtn.disabled) return;
                playBtn.disabled = true;

                let pName = nicknameInput.value.trim() || "Player";
                menu.style.opacity = 0;
                setTimeout(() => {
                    menu.style.display = 'none';
                    canvas.style.display = 'block';
                    massCounterUI.style.display = 'block';
                    leaderboardUI.style.display = 'block';
                    
                    checkDevice();
                    if (isMobile) {
                        joystickZone.style.display = 'flex';
                        mobileButtonsZone.style.display = 'flex';
                    } else {
                        // На ПК выводим блок кнопок справа только ради подсказки хоткеев
                        mobileButtonsZone.style.display = 'flex';
                    }
                    
                    currentSkin = SKINS[Math.floor(Math.random() * SKINS.length)];
                    resizeCanvas();
                    
                    if(cdInterval) clearInterval(cdInterval);
                    isCooldown = false;
                    shiftBtn.classList.remove('cooldown');
                    cdTimerText.style.display = 'none';

                    socket.emit('init_player', { name: pName, skin: currentSkin });
                    playBtn.disabled = false;
                }, 500);
            });

            function gameOver() {
                isPlaying = false;
                canvas.style.display = 'none';
                joystickZone.style.display = 'none';
                mobileButtonsZone.style.display = 'none';
                massCounterUI.style.display = 'none';
                leaderboardUI.style.display = 'none';
                menu.style.display = 'flex';
                setTimeout(() => { menu.style.opacity = 1; }, 50);
            }

            function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; checkDevice(); }
            window.addEventListener('resize', resizeCanvas);

            function activateQuantumShift() {
                if (isCooldown || !isPlaying) return;
                socket.emit('quantum_shift');

                isCooldown = true;
                cdRemaining = cdDuration;
                shiftBtn.classList.add('cooldown');
                cdTimerText.style.display = 'flex';
                cdTimerText.innerText = cdRemaining;

                cdInterval = setInterval(() => {
                    cdRemaining--;
                    cdTimerText.innerText = cdRemaining;
                    if (cdRemaining <= 0) {
                        clearInterval(cdInterval);
                        isCooldown = false;
                        shiftBtn.classList.remove('cooldown');
                        cdTimerText.style.display = 'none';
                    }
                }, 1000);
            }

            function createExplosion(x, y, color, count = 20) {
                for (let i = 0; i < count; i++) {
                    let angle = Math.random() * Math.PI * 2;
                    let speed = Math.random() * 5 + 2;
                    particles.push({
                        x: x, y: y,
                        vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed,
                        radius: Math.random() * 4 + 2, color: color, alpha: 1,
                        decay: Math.random() * 0.03 + 0.015
                    });
                }
            }

            function updateVisuals() {
                for (let i = particles.length - 1; i >= 0; i--) {
                    let p = particles[i];
                    p.x += p.vx; p.y += p.vy; p.alpha -= p.decay;
                    if (p.alpha <= 0) particles.splice(i, 1);
                }
                if (isPlaying && otherPlayers[socket.id]) {
                    let me = otherPlayers[socket.id];
                    camera.x += (me.x - canvas.width / 2 - camera.x) * 0.08;
                    camera.y += (me.y - canvas.height / 2 - camera.y) * 0.08;
                }
            }

            function updateLeaderboard() {
                let allPlayers = Object.values(otherPlayers);
                allPlayers.sort((a, b) => b.score - a.score);
                leaderList.innerHTML = "";
                allPlayers.slice(0, 10).forEach((p, index) => {
                    let item = document.createElement('div');
                    item.className = (p.id === socket.id) ? 'leader-item player' : 'leader-item';
                    item.innerHTML = `<span>${index + 1}. ${p.name}</span><span>${p.score}</span>`;
                    leaderList.appendChild(item);
                });
            }

            function draw() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.save();
                ctx.translate(-camera.x, -camera.y);

                // Сетка
                ctx.strokeStyle = '#11161d'; ctx.lineWidth = 1;
                for (let x = 0; x <= WORLD_SIZE; x += 60) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, WORLD_SIZE); ctx.stroke(); }
                for (let y = 0; y <= WORLD_SIZE; y += 60) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(WORLD_SIZE, y); ctx.stroke(); }

                // Граница карты
                ctx.strokeStyle = '#ff0055'; ctx.lineWidth = 5; ctx.strokeRect(0, 0, WORLD_SIZE, WORLD_SIZE);

                // Еда
                foods.forEach(f => {
                    ctx.beginPath(); ctx.arc(f.x, f.y, f.radius, 0, Math.PI * 2);
                    ctx.fillStyle = f.color; ctx.fill();
                });

                // Все игроки
                for (let id in otherPlayers) {
                    let p = otherPlayers[id];
                    if (!p.snake || p.snake.length === 0) continue;

                    for (let i = p.snake.length - 1; i >= 0; i--) {
                        let seg = p.snake[i];
                        let r = maxSegmentRadius;
                        if (i > p.snake.length * 0.75) {
                            r = maxSegmentRadius * (1 - ((i - p.snake.length * 0.75) / (p.snake.length * 0.25)) * 0.15); 
                        }

                        ctx.beginPath(); ctx.arc(seg.x, seg.y, r, 0, Math.PI * 2);
                        let gradient = ctx.createRadialGradient(seg.x - r * 0.3, seg.y - r * 0.3, r * 0.1, seg.x, seg.y, r);
                        let skin = p.skin || SKINS[0];

                        if (i === 0) {
                            gradient.addColorStop(0, skin.head[0]); gradient.addColorStop(0.2, skin.head[1]); gradient.addColorStop(1, skin.head[2]);
                            if (p.spawnProtection > 0) ctx.globalAlpha = 0.5;
                            else { ctx.shadowBlur = 15; ctx.shadowColor = skin.head[1]; }
                        } else if (i === p.snake.length - 1) {
                            gradient.addColorStop(0, skin.tail[0]); gradient.addColorStop(0.2, skin.tail[1]); gradient.addColorStop(1, skin.tail[2]);
                        } else {
                            gradient.addColorStop(0, skin.body[0]); gradient.addColorStop(0.3, skin.body[1]); gradient.addColorStop(1, skin.body[2]);
                        }

                        ctx.fillStyle = gradient; ctx.fill(); ctx.closePath(); ctx.shadowBlur = 0;

                        if (i === 0) {
                            let headAngle = seg.angle;
                            let leftEyeX = seg.x + Math.cos(headAngle - 0.6) * r * 0.5;
                            let leftEyeY = seg.y + Math.sin(headAngle - 0.6) * r * 0.5;
                            let rightEyeX = seg.x + Math.cos(headAngle + 0.6) * r * 0.5;
                            let rightEyeY = seg.y + Math.sin(headAngle + 0.6) * r * 0.5;

                            ctx.fillStyle = '#ffffff';
                            ctx.beginPath(); ctx.arc(leftEyeX, leftEyeY, r * 0.35, 0, Math.PI * 2); ctx.fill();
                            ctx.beginPath(); ctx.arc(rightEyeX, rightEyeY, r * 0.35, 0, Math.PI * 2); ctx.fill();

                            ctx.fillStyle = '#000000';
                            ctx.beginPath(); ctx.arc(leftEyeX + Math.cos(headAngle)*2, leftEyeY + Math.sin(headAngle)*2, r * 0.18, 0, Math.PI * 2); ctx.fill();
                            ctx.beginPath(); ctx.arc(rightEyeX + Math.cos(headAngle)*2, rightEyeY + Math.sin(headAngle)*2, r * 0.18, 0, Math.PI * 2); ctx.fill();

                            ctx.fillStyle = (id === socket.id) ? '#66fcf1' : '#ffffff'; ctx.font = 'bold 14px Segoe UI'; ctx.textAlign = 'center';
                            ctx.shadowColor = '#000000'; ctx.shadowBlur = 4;
                            ctx.fillText(p.name, seg.x, seg.y - r - 8); ctx.shadowBlur = 0;
                            ctx.globalAlpha = 1.0;
                        }
                    }
                }

                // Эффекты взрывов
                particles.forEach(p => {
                    ctx.save(); ctx.globalAlpha = p.alpha; ctx.fillStyle = p.color;
                    ctx.beginPath(); ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2); ctx.fill(); ctx.restore();
                });

                ctx.restore();

                // РАДАР (МИНИКАРТА) ПЕРЕНЕСЕН В СЛЕВА СВЕРХУ ДЛЯ МОБИЛОК И ПК
                let radarSize = isMobile ? 100 : 130; 
                let radarX = 20; 
                let radarY = 20;
                
                ctx.fillStyle = 'rgba(11, 12, 16, 0.85)'; ctx.strokeStyle = '#45a29e'; ctx.lineWidth = 2;
                ctx.fillRect(radarX, radarY, radarSize, radarSize); ctx.strokeRect(radarX, radarY, radarSize, radarSize);

                for (let id in otherPlayers) {
                    let op = otherPlayers[id];
                    ctx.fillStyle = (op.skin) ? op.skin.head[1] : '#66fcf1';
                    ctx.beginPath(); ctx.arc(radarX + (op.x / WORLD_SIZE) * radarSize, radarY + (op.y / WORLD_SIZE) * radarSize, (id === socket.id)? 4: 3.5, 0, Math.PI * 2); ctx.fill();
                }
            }

            function gameLoop() {
                updateVisuals();
                draw();
                requestAnimationFrame(gameLoop);
            }
            requestAnimationFrame(gameLoop);
        })();
    </script>
</body>
</html>
