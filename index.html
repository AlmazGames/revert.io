<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Revert.io</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-user-select: none; touch-action: none; }
        body, html { width: 100%; height: 100%; overflow: hidden; background-color: #0b0c10; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }

        /* ГЛАВНОЕ МЕНЮ */
        #main-menu {
            position: absolute; width: 100%; height: 100%; z-index: 10;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: radial-gradient(circle, #1f2833 0%, #0b0c10 100%);
            transition: opacity 0.5s ease;
        }
        .title {
            font-size: 72px; font-weight: 900; color: #66fcf1;
            text-shadow: 0 0 10px #66fcf1, 0 0 30px #45a29e;
            letter-spacing: 5px; margin-bottom: 30px;
        }
        .menu-box {
            background: rgba(31, 40, 51, 0.85); border: 2px solid #45a29e;
            padding: 40px; border-radius: 16px; box-shadow: 0 0 25px rgba(102, 252, 241, 0.2);
            display: flex; flex-direction: column; align-items: center; gap: 20px; width: 340px;
        }
        input-nick {
            width: 100%; padding: 12px 20px; background: #0b0c10; border: 1px solid #45a29e;
            border-radius: 8px; color: #fff; font-size: 16px; text-align: center; outline: none;
        }
        input-nick:focus { border-color: #66fcf1; box-shadow: 0 0 10px rgba(102, 252, 241, 0.5); }
        
        .btn-play {
            width: 100%; padding: 14px; background: #45a29e; border: none; border-radius: 8px;
            color: #0b0c10; font-size: 18px; font-weight: bold; cursor: pointer; transition: all 0.2s;
        }
        .btn-play:hover { background: #66fcf1; box-shadow: 0 0 15px #66fcf1; transform: scale(1.02); }

        /* ТАБЛИЦА РЕКОРДОВ RECORDS (ЛЕВАЯ НИЖНЯЯ) */
        #menu-records {
            position: absolute; left: 30px; bottom: 30px; width: 290px;
            height: 38vh; background: rgba(31, 40, 51, 0.55); border: 2px solid #45a29e;
            box-shadow: 0 0 20px rgba(69, 162, 158, 0.25); border-radius: 12px;
            padding: 15px; display: flex; flex-direction: column; backdrop-filter: blur(4px); z-index: 12;
        }
        .records-header {
            font-size: 18px; font-weight: 900; color: #66fcf1; text-shadow: 0 0 8px rgba(102, 252, 241, 0.6);
            letter-spacing: 4px; text-align: center; border-bottom: 1px solid rgba(69, 162, 158, 0.4);
            padding-bottom: 8px; margin-bottom: 8px;
        }
        .records-list { flex: 1; display: flex; flex-direction: column; justify-content: space-between; overflow: hidden; }
        .records-item { display: flex; justify-content: space-between; align-items: center; font-size: 13px; color: #c5c6c7; padding: 2px 0; }
        .rec-rank { color: #45a29e; font-weight: bold; width: 22px; }
        .records-item:nth-child(1) .rec-rank { color: #ffd700; text-shadow: 0 0 5px #ffd700; }
        .records-item:nth-child(2) .rec-rank { color: #c0c0c0; text-shadow: 0 0 5px #c0c0c0; }
        .records-item:nth-child(3) .rec-rank { color: #cd7f32; text-shadow: 0 0 5px #cd7f32; }
        .rec-name { flex: 1; text-align: left; padding-left: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .rec-score { font-weight: bold; color: #66fcf1; }

        /* ИГРОВОЙ ИНТЕРФЕЙС (HUD) */
        #hud { position: absolute; top: 20px; left: 20px; z-index: 5; display: none; pointer-events: none; }
        #mass-counter { font-size: 24px; font-weight: 900; color: #66fcf1; text-shadow: 0 0 10px rgba(102, 252, 241, 0.5); }

        /* ИГРОВОЙ ЛИДЕРБОРД (ПРАВЫЙ ВЕРХНИЙ) */
        #leaderboard {
            position: absolute; top: 20px; right: 20px; background: rgba(31, 40, 51, 0.7);
            border: 1px solid #45a29e; padding: 15px; border-radius: 10px; width: 220px;
            color: #c5c6c7; font-family: sans-serif; z-index: 5; display: none;
        }
        #leaderboard h3 { margin-bottom: 10px; color: #66fcf1; font-size: 16px; text-align: center; letter-spacing: 2px; }
        .leader-item { display: flex; justify-content: space-between; font-size: 13px; margin: 4px 0; }
        .leader-item.player { color: #66fcf1; font-weight: bold; text-shadow: 0 0 5px #66fcf1; }

        /* РАДАР (МИНИКАРТА С ПЛАВНЫМ КУРСОМ) */
        #radar {
            position: absolute; bottom: 20px; right: 20px; width: 150px; height: 150px;
            background: rgba(11, 12, 16, 0.75); border: 2px solid #45a29e; border-radius: 50%;
            box-shadow: 0 0 15px rgba(69, 162, 158, 0.4); z-index: 5; display: none;
        }

        canvas { display: block; width: 100%; height: 100%; }

        /* АДАПТИВНОСТЬ */
        @media (max-width: 768px) {
            .title { font-size: 44px; }
            #menu-records { left: 15px; bottom: 15px; width: 210px; height: 35vh; padding: 8px; }
            .records-header { font-size: 13px; }
            .records-item { font-size: 11px; }
            #leaderboard { width: 170px; padding: 10px; right: 10px; top: 10px; }
            #radar { width: 110px; height: 110px; bottom: 10px; right: 10px; }
        }
    </style>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
</head>
<body>

    <div id="main-menu">
        <div class="title">REVERT.IO</div>
        <div class="menu-box">
            <input type="text" id="nick-input" placeholder="ENTER NICKNAME" maxlength="14">
            <button class="btn-play" id="btn-start">PLAY NOW</button>
        </div>

        <div id="menu-records">
            <div class="records-header">RECORDS</div>
            <div class="records-list" id="menu-records-list"></div>
        </div>
    </div>

    <div id="hud">
        <div id="mass-counter">MASS: 35</div>
    </div>

    <div id="leaderboard">
        <h3>LEADERBOARD</h3>
        <div id="leader-list"></div>
    </div>

    <canvas id="radar"></canvas>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const radarCanvas = document.getElementById('radar');
        const rCtx = radarCanvas.getContext('2d');

        const mainMenu = document.getElementById('main-menu');
        const btnStart = document.getElementById('btn-start');
        const nickInput = document.getElementById('nick-input');
        const hud = document.getElementById('hud');
        const massCounterUI = document.getElementById('mass-counter');
        const leaderboardUI = document.getElementById('leaderboard');
        const leaderList = document.getElementById('leader-list');
        const menuRecordsList = document.getElementById('menu-records-list');

        // Инициализация размеров экрана
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            radarCanvas.width = 150;
            radarCanvas.height = 150;
        }
        window.addEventListener('resize', resize);
        resize();

        // СЕТЕВЫЕ ПЕРЕМЕННЫЕ
        let socket = null;
        let isPlaying = false;
        let isOfflineMode = false; 

        // ИГРОВЫЕ ДАННЫЕ
        let myId = null;
        let pX = 2000, pY = 2000, pAngle = 0, pTargetAngle = 0;
        let score = 35;
        let clientSnake = []; 
        let myServerSnake = []; 
        let otherPlayers = {};
        let foods = [];
        let spawnProtection = 0;

        const WORLD_SIZE = 4000;
        const TARGET_DIST = 9;
        const MAX_SEGMENT_RADIUS = 14;

        // Фирменный скин игрока
        const MY_SKIN = { head: ["#ffffff", "#00ffff", "#008b8b"], body: ["#66fcf1", "#45a29e", "#1f2833"], tail: ["#ffffff", "#00ffff", "#ffffff"] };

        // ПОДКЛЮЧЕНИЕ К СЕРВЕРУ ПРИ СТАРТЕ СТРАНИЦЫ (Для чтения рекордов в меню)
        function connectSocket() {
            socket = io("http://localhost:3000", { transpors: ['websocket'] });

            socket.on('init_data', (data) => {
                foods = data.foods;
                for(let id in data.players) {
                    if(id !== socket.id) otherPlayers[id] = data.players[id];
                }
            });

            socket.on('new_player', (p) => { if(p.id !== socket.id) otherPlayers[p.id] = p; });
            socket.on('player_disconnected', (id) => { delete otherPlayers[id]; });
            socket.on('food_update', (d) => {
                foods = foods.filter(f => f.id !== d.eatenId);
                foods.push(d.newFood);
            });

            // Единый прием ТОП-10 раз в 2 секунды
            socket.on('leaderboard_update', (serverLeaderboard) => {
                if (isOfflineMode) return;
                
                // 1. Обновляем игровой ТОП (если играем)
                if (isPlaying) {
                    leaderList.innerHTML = "";
                    serverLeaderboard.forEach((p, index) => {
                        let item = document.createElement('div');
                        item.className = (p.id === socket.id) ? 'leader-item player' : 'leader-item';
                        item.innerHTML = `<span>${index + 1}. ${p.name}</span><span>${p.score}</span>`;
                        leaderList.appendChild(item);
                    });
                }

                // 2. Обновляем меню RECORDS (всегда)
                if (menuRecordsList) {
                    menuRecordsList.innerHTML = "";
                    serverLeaderboard.forEach((p, index) => {
                        let item = document.createElement('div');
                        item.className = 'records-item';
                        let formattedScore = Number(p.score).toLocaleString(); 
                        item.innerHTML = `
                            <span class="rec-rank">${index + 1}</span>
                            <span class="rec-name">${p.name}</span>
                            <span class="rec-score">${formattedScore}</span>
                        `;
                        menuRecordsList.appendChild(item);
                    });
                }
            });

            socket.on('heartbeat', (serverPlayers) => {
                if (!isPlaying || isOfflineMode) return;
                for (let id in serverPlayers) {
                    let sp = serverPlayers[id];
                    if (id === socket.id) {
                        score = sp.score;
                        myServerSnake = sp.snake; 
                        spawnProtection = sp.spawnProtection;
                        massCounterUI.innerText = `MASS: ${score}`;
                    } else if (otherPlayers[id]) {
                        otherPlayers[id].score = sp.score;
                        otherPlayers[id].spawnProtection = sp.spawnProtection;
                        otherPlayers[id].serverSnake = sp.snake;
                    }
                }
                for (let id in otherPlayers) {
                    if (!serverPlayers[id]) delete otherPlayers[id];
                }
            });

            socket.on('spawned', (p) => {
                pX = p.x; pY = p.y; pAngle = p.angle;
                clientSnake = JSON.parse(JSON.stringify(p.snake));
                myServerSnake = p.snake;
                isPlaying = true;
                mainMenu.style.opacity = 0;
                setTimeout(() => { mainMenu.style.display = 'none'; }, 500);
                hud.style.display = 'block';
                leaderboardUI.style.display = 'block';
                radarCanvas.style.display = 'block';
            });

            socket.on('player_died_notification', (id) => {
                if (id === socket.id) {
                    isPlaying = false;
                    alert("ВЗРЫВ! Ты врезался в чужую змейку.");
                    location.reload();
                }
            });
        }

        // СТАРТ ИГРЫ ПО КНОПКЕ
        btnStart.addEventListener('click', () => {
            let name = nickInput.value.trim() || "CyberSnake";
            if(socket && socket.connected) {
                socket.emit('init_player', { name: name, skin: MY_SKIN });
            } else {
                alert("Нет подключения к серверу!");
            }
        });

        // УПРАВЛЕНИЕ МЫШЬЮ
        window.addEventListener('mousemove', (e) => {
            if (!isPlaying || isOfflineMode) return;
            let dx = e.clientX - canvas.width / 2;
            let dy = e.clientY - canvas.height / 2;
            pTargetAngle = Math.atan2(dy, dx);
            socket.emit('update_input', { targetAngle: pTargetAngle, isBoosting: false });
        });

        // КВАНТОВЫЙ РАЗВОРOT НА КЛАВИШУ 'T'
        window.addEventListener('keydown', (e) => {
            if ((e.key === 't' || e.key === 'T' || e.key === 'е' || e.key === 'Е') && isPlaying) {
                socket.emit('quantum_shift');
            }
        });

        // КЛИЕНТСКАЯ ИНТЕРПОЛЯЦИЯ И ОТРИСОВКА (60+ FPS)
        function gameLoop() {
            requestAnimationFrame(gameLoop);
            ctx.fillStyle = '#0b0c10';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            if (!isPlaying) return;

            // Плавное следование головы локально
            let angleDiff = pTargetAngle - pAngle;
            while (angleDiff < -Math.PI) angleDiff += Math.PI * 2;
            while (angleDiff > Math.PI) angleDiff -= Math.PI * 2;
            if (Math.abs(angleDiff) > 0.001) pAngle += angleDiff * 0.1;

            pX += Math.cos(pAngle) * 4;
            pY += Math.sin(pAngle) * 4;

            if (clientSnake.length > 0) {
                clientSnake[0] = { x: pX, y: pY, angle: pAngle };
            }

            // Сглаживание хвоста по серверным координатам
            if (myServerSnake && myServerSnake.length > 0) {
                while (clientSnake.length < myServerSnake.length) {
                    clientSnake.push({ x: pX, y: pY, angle: pAngle });
                }
                while (clientSnake.length > myServerSnake.length) {
                    clientSnake.pop();
                }
                for (let i = 1; i < clientSnake.length; i++) {
                    let sSeg = myServerSnake[i];
                    if (sSeg) {
                        clientSnake[i].x += (sSeg.x - clientSnake[i].x) * 0.25;
                        clientSnake[i].y += (sSeg.y - clientSnake[i].y) * 0.25;
                        clientSnake[i].angle += (sSeg.angle - clientSnake[i].angle) * 0.25;
                    }
                }
            }

            // Плавный расчет позиций ботов/врагов
            for (let id in otherPlayers) {
                let op = otherPlayers[id];
                if (op.serverSnake && op.serverSnake.length > 0) {
                    if (!op.snake || op.snake.length === 0) {
                        op.snake = JSON.parse(JSON.stringify(op.serverSnake));
                    }
                    while (op.snake.length < op.serverSnake.length) {
                        op.snake.push({ x: op.serverSnake[0].x, y: op.serverSnake[0].y, angle: op.serverSnake[0].angle });
                    }
                    while (op.snake.length > op.serverSnake.length) {
                        op.snake.pop();
                    }
                    op.snake[0].x += (op.serverSnake[0].x - op.snake[0].x) * 0.3;
                    op.snake[0].y += (op.serverSnake[0].y - op.snake[0].y) * 0.3;
                    op.snake[0].angle = op.serverSnake[0].angle;

                    for (let i = 1; i < op.snake.length; i++) {
                        let ss = op.serverSnake[i];
                        if (ss) {
                            op.snake[i].x += (ss.x - op.snake[i].x) * 0.25;
                            op.snake[i].y += (ss.y - op.snake[i].y) * 0.25;
                            op.snake[i].angle += (ss.angle - op.snake[i].angle) * 0.25;
                        }
                    }
                }
            }

            // СДВИГ КАМЕРЫ ПО ЦЕНТРУ
            let camX = canvas.width / 2 - pX;
            let camY = canvas.height / 2 - pY;

            // СЕТКА КАРТЫ
            ctx.strokeStyle = '#1f2833';
            ctx.lineWidth = 1;
            const gridSize = 50;
            let startGridX = Math.floor(-camX / gridSize) * gridSize;
            let endGridX = startGridX + canvas.width + gridSize;
            let startGridY = Math.floor(-camY / gridSize) * gridSize;
            let endGridY = startGridY + canvas.height + gridSize;

            for (let x = startGridX; x < endGridX; x++) {
                if (x >= 0 && x <= WORLD_SIZE) {
                    ctx.beginPath(); ctx.moveTo(x + camX, Math.max(0, camY)); ctx.lineTo(x + camX, Math.min(WORLD_SIZE, WORLD_SIZE + camY)); ctx.stroke();
                }
            }
            for (let y = startGridY; y < endGridY; y++) {
                if (y >= 0 && y <= WORLD_SIZE) {
                    ctx.beginPath(); ctx.moveTo(Math.max(0, camX), y + camY); ctx.lineTo(Math.min(WORLD_SIZE, WORLD_SIZE + camX), y + camY); ctx.stroke();
                }
            }

            // ОТРИСОВКА ЕДЫ
            for (let f of foods) {
                ctx.fillStyle = f.color;
                ctx.beginPath();
                ctx.arc(f.x + camX, f.y + camY, f.radius, 0, Math.PI * 2);
                ctx.fill();
            }

            // ФУНКЦИЯ ОТРИСОВКИ ЗМЕЙКИ
            function drawSnake(snakeData, skin, name, isMe) {
                if (!snakeData || snakeData.length === 0) return;
                for (let i = snakeData.length - 1; i >= 0; i--) {
                    let seg = snakeData[i];
                    let r = MAX_SEGMENT_RADIUS;
                    let color = skin.body[i % skin.body.length];
                    if (i === 0) color = skin.head[1];
                    if (i === snakeData.length - 1) color = skin.tail[1];

                    ctx.fillStyle = color;
                    ctx.beginPath();
                    ctx.arc(seg.x + camX, seg.y + camY, r, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.strokeStyle = skin.body[0];
                    ctx.lineWidth = 1.5;
                    ctx.stroke();

                    // Глаза на голове
                    if (i === 0) {
                        let hAngle = seg.angle;
                        let leX = seg.x + Math.cos(hAngle - 0.5) * r * 0.5;
                        let leY = seg.y + Math.sin(hAngle - 0.5) * r * 0.5;
                        let reX = seg.x + Math.cos(hAngle + 0.5) * r * 0.5;
                        let reY = seg.y + Math.sin(hAngle + 0.5) * r * 0.5;

                        ctx.fillStyle = '#fff';
                        ctx.beginPath(); ctx.arc(leX + camX, leY + camY, r*0.35, 0, Math.PI*2); ctx.fill();
                        ctx.beginPath(); ctx.arc(reX + camX, reY + camY, r*0.35, 0, Math.PI*2); ctx.fill();
                    }
                }
                // Имя
                ctx.fillStyle = isMe ? '#66fcf1' : '#fff';
                ctx.font = 'bold 13px sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText(name, snakeData[0].x + camX, snakeData[0].y + camY - 22);
            }

            // Рендер врагов и себя
            for (let id in otherPlayers) {
                let op = otherPlayers[id];
                if (op.snake) drawSnake(op.snake, op.skin, op.name, false);
            }
            drawSnake(clientSnake, MY_SKIN, nickInput.value.trim() || "CyberSnake", true);

            // ОТРИСОВКА ПЛАВНОГО РАДАРА (60 FPS)
            rCtx.clearRect(0, 0, radarCanvas.width, radarCanvas.height);
            // Сетка миникарты
            rCtx.strokeStyle = 'rgba(69, 162, 158, 0.2)';
            rCtx.lineWidth = 1;
            for(let i=30; i<150; i+=30) {
                rCtx.beginPath(); rCtx.moveTo(i, 0); rCtx.lineTo(i, 150); rCtx.stroke();
                rCtx.beginPath(); rCtx.moveTo(0, i); rCtx.lineTo(150, i); rCtx.stroke();
            }
            // Точки врагов
            for (let id in otherPlayers) {
                let op = otherPlayers[id];
                if (op.snake && op.snake[0]) {
                    let rx = (op.snake[0].x / WORLD_SIZE) * 150;
                    let ry = (op.snake[0].y / WORLD_SIZE) * 150;
                    rCtx.fillStyle = op.skin ? op.skin.head[1] : '#ff0055';
                    rCtx.beginPath(); rCtx.arc(rx, ry, 2.5, 0, Math.PI * 2); rCtx.fill();
                }
            }
            // Точка игрока (Белый пульсирующий неон)
            let myRx = (pX / WORLD_SIZE) * 150;
            let myRy = (pY / WORLD_SIZE) * 150;
            rCtx.fillStyle = '#66fcf1';
            rCtx.shadowBlur = 10; rCtx.shadowColor = '#66fcf1';
            rCtx.beginPath(); rCtx.arc(myRx, myRy, 3.5, 0, Math.PI * 2); rCtx.fill();
            rCtx.shadowBlur = 0; // Сброс теней для оптимизации
        }

        // Запуск сети и графики
        connectSocket();
        gameLoop();
    </script>
</body>
</html>
